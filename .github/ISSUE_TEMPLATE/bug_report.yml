name: Bug report
description: Report something that is broken or surprising.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Include a minimal config, command, or test case.
      render: bash
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: flashpod version
      placeholder: "0.1.0"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, package manager, OS, and runpod-flash version if relevant.
