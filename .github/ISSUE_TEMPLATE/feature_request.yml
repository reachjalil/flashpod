name: Feature request
description: Suggest a focused improvement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What are you trying to do with RunPod Flash from TypeScript?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What API, CLI behavior, or generator support would help?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or adjacent tools you tried.
